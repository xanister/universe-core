name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Configure git credentials for private deps
        run: |
          if [ -z "${{ secrets.FORGE_ACCESS_TOKEN }}" ]; then
            echo "::error::FORGE_ACCESS_TOKEN is not set."
            exit 1
          fi
          git config --global url."https://${{ secrets.FORGE_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
